<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Life Vision Board 独立 Web/App 产品路线图</title>
  <desc id="desc">将 Standalone Web/App Goal Plan 翻译成中文后的可视化路线图，包含当前阶段、六个里程碑、第一周行动、关键原则和模型框架探索。</desc>
  <defs>
    <style>
      .bg { fill: #f7f4ed; }
      .panel { fill: #ffffff; stroke: #ded7c7; stroke-width: 2; }
      .panel-soft { fill: #fdfaf4; stroke: #ded7c7; stroke-width: 2; }
      .title { font: 700 40px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
      .subtitle { font: 400 22px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #52616b; }
      .section { font: 700 24px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #1f2933; }
      .text { font: 400 16px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #344854; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #52616b; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #52616b; }
      .node { fill: #e7f6f2; stroke: #179b8f; stroke-width: 2; }
      .node-amber { fill: #fff4dc; stroke: #d6912a; stroke-width: 2; }
      .node-blue { fill: #eaf2ff; stroke: #3b82f6; stroke-width: 2; }
      .arrow { stroke: #7b8794; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .route { stroke: #179b8f; stroke-width: 5; fill: none; stroke-linecap: round; }
      .dot { fill: #179b8f; stroke: #ffffff; stroke-width: 4; }
      .badge { fill: #1f2933; }
      .badge-text { font: 700 13px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .footer { font: 700 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #ffffff; }
      .grid-line { stroke: #e7e0d1; stroke-width: 1; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8794"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1000"/>
  <circle cx="1320" cy="90" r="62" fill="#e7f6f2" opacity="0.55"/>
  <circle cx="1455" cy="190" r="38" fill="#fff4dc" opacity="0.7"/>

  <text x="70" y="82" class="title">Life Vision Board 独立 Web/App 产品路线图</text>
  <text x="72" y="122" class="subtitle">从 Agent Pack 内核到 Life Portfolio Dashboard</text>

  <rect x="70" y="165" width="360" height="170" rx="18" class="panel"/>
  <text x="95" y="205" class="section">当前阶段</text>
  <text x="95" y="245" class="label">Agent Pack / Skill 内核已成型</text>
  <text x="95" y="276" class="text">已有：目标澄清、当前位置评估、里程碑、</text>
  <text x="95" y="302" class="text">阶段行动、陪跑、复盘、状态记忆。</text>

  <rect x="1170" y="165" width="360" height="170" rx="18" class="panel"/>
  <text x="1195" y="205" class="section">6 周目标</text>
  <text x="1195" y="245" class="label">可演示的 MVP 候选版本</text>
  <text x="1195" y="276" class="text">用户可以创建目标、拆解行动、记录证据，</text>
  <text x="1195" y="302" class="text">并完成一次真实复盘调整。</text>

  <path d="M 465 250 C 580 170, 680 170, 785 250 S 990 330, 1115 250" class="route"/>
  <circle cx="500" cy="230" r="20" class="dot"/>
  <circle cx="625" cy="197" r="20" class="dot"/>
  <circle cx="760" cy="236" r="20" class="dot"/>
  <circle cx="885" cy="284" r="20" class="dot"/>
  <circle cx="1010" cy="281" r="20" class="dot"/>
  <circle cx="1115" cy="250" r="20" class="dot"/>

  <g>
    <rect x="455" y="275" width="185" height="108" rx="16" class="node"/>
    <text x="477" y="305" class="badge-text"><tspan class="badge-text">M1</tspan></text>
    <rect x="470" y="290" width="34" height="20" rx="8" class="badge"/>
    <text x="475" y="305" class="badge-text">M1</text>
    <text x="470" y="336" class="label">产品基础</text>
    <text x="470" y="362" class="small">MVP 范围与验收标准</text>
  </g>
  <g>
    <rect x="570" y="112" width="205" height="105" rx="16" class="node-blue"/>
    <rect x="585" y="127" width="34" height="20" rx="8" class="badge"/>
    <text x="590" y="142" class="badge-text">M2</text>
    <text x="585" y="173" class="label">状态基础</text>
    <text x="585" y="198" class="small">多目标 Life Portfolio 模型</text>
  </g>
  <g>
    <rect x="710" y="280" width="205" height="112" rx="16" class="node"/>
    <rect x="725" y="295" width="34" height="20" rx="8" class="badge"/>
    <text x="730" y="310" class="badge-text">M3</text>
    <text x="725" y="342" class="label">运行时基础</text>
    <text x="725" y="367" class="small">服务边界与 Adapter</text>
  </g>
  <g>
    <rect x="845" y="90" width="205" height="112" rx="16" class="node-amber"/>
    <rect x="860" y="105" width="34" height="20" rx="8" class="badge"/>
    <text x="865" y="120" class="badge-text">M4</text>
    <text x="860" y="152" class="label">Dashboard MVP</text>
    <text x="860" y="177" class="small">目标组合与周焦点</text>
  </g>
  <g>
    <rect x="960" y="330" width="225" height="112" rx="16" class="node-blue"/>
    <rect x="975" y="345" width="34" height="20" rx="8" class="badge"/>
    <text x="980" y="360" class="badge-text">M5</text>
    <text x="975" y="392" class="label">模型 / 框架评测</text>
    <text x="975" y="417" class="small">GLM、DeepSeek、Qwen、LangGraph</text>
  </g>
  <g>
    <rect x="1085" y="455" width="225" height="112" rx="16" class="node"/>
    <rect x="1100" y="470" width="34" height="20" rx="8" class="badge"/>
    <text x="1105" y="485" class="badge-text">M6</text>
    <text x="1100" y="517" class="label">端到端闭环</text>
    <text x="1100" y="542" class="small">创建、拆解、记录、复盘</text>
  </g>

  <rect x="70" y="430" width="600" height="420" rx="18" class="panel-soft"/>
  <text x="100" y="472" class="section">第一周动作</text>
  <text x="100" y="506" class="small">目标：把 Web/App 野心压成可开工的 MVP 基础</text>
  <line x1="100" y1="528" x2="640" y2="528" class="grid-line"/>
  <g class="text">
    <text x="105" y="565"><tspan class="label">D1</tspan> 写 MVP Spec：用户、范围、非范围、页面、验收标准</text>
    <text x="105" y="604"><tspan class="label">D2</tspan> 设计 Life Portfolio Schema：多目标、暂停、待办、能量预算</text>
    <text x="105" y="643"><tspan class="label">D3</tspan> 更新模型评测矩阵：GLM-5.2、DeepSeek-V4、Qwen</text>
    <text x="105" y="682"><tspan class="label">D4</tspan> 比较 Agent Runtime：LangGraph、OpenAI SDK、Dify、CrewAI</text>
    <text x="105" y="721"><tspan class="label">D5</tspan> 定义 App 架构：模块、API、存储、fixture 驱动 MVP</text>
    <text x="105" y="760"><tspan class="label">D6</tspan> 准备 Dashboard 夹具与线框：组合页、目标详情、复盘页</text>
    <text x="105" y="799"><tspan class="label">D7</tspan> 复盘：决定第一个实现切片和下一周计划</text>
  </g>

  <rect x="710" y="610" width="390" height="240" rx="18" class="panel"/>
  <text x="740" y="650" class="section">关键原则</text>
  <text x="740" y="690" class="text">平台中立：不绑定 Codex 或单一宿主</text>
  <text x="740" y="724" class="text">模型可替换：先评测，不被热度带跑</text>
  <text x="740" y="758" class="text">Dashboard 是主体验：不是聊天记录皮肤</text>
  <text x="740" y="792" class="text">证据驱动复盘：路线根据真实输出调整</text>

  <rect x="1140" y="610" width="390" height="240" rx="18" class="panel"/>
  <text x="1170" y="650" class="section">探索候选</text>
  <text x="1170" y="690" class="text">模型：GLM-5.2、DeepSeek-V4、Qwen、托管模型</text>
  <text x="1170" y="724" class="text">框架：LangGraph、OpenAI Agents SDK、Dify</text>
  <text x="1170" y="758" class="text">备选：CrewAI、Microsoft Agent Framework</text>
  <text x="1170" y="792" class="text">保留：手写 orchestrator，确保状态控制</text>

  <rect x="70" y="890" width="1460" height="56" rx="18" fill="#1f2933"/>
  <text x="105" y="925" class="footer">下一步：先写独立 Web/App MVP Spec，明确第一用户、MVP 必做、不做、Dashboard 数据状态和成功演示标准。</text>
</svg>
